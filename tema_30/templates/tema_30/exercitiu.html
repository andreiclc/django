{% extends 'tema_30/includes/headers.html' %}

{% block content %}

    <div class="container mt-5 section1">

        <h1 class="">Lista Book</h1>

        <hr>
        <div>
            <a href="{% url 'add_books' %}" class="btn btn-outline-success btn-sm mb-3">adauga carte</a>
            <a href="{% url 'delete_books' %}" class="btn btn-outline-danger btn-sm mb-3">sterge toate cartile</a>
        </div>
        <hr>
        <ul class="mt-3">
            {% for book in books %}
                <li>{{ book.name }} - {{ book.author }} - {{ book.release_date|date }}</li>
            {% endfor %}
        </ul>


    </div>

{% endblock %}
