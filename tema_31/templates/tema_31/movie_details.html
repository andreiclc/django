{% extends 'tema_31/includes/headers.html' %}

{% block content %}

    <div class="container mt-5 section1">

        <div class="d-flex align-items-center justify-content-around">
            <a href="{% url 'movies' %}" class="btn btn-outline-light btn-sm">inapoi <i class="ri-arrow-left-line"></i></a>
            <h1 class="fw-bolder text-success">{{ movie.name_movie }}</h1>
            <div></div>
        </div>

        <hr>

        <p><strong><i class="ri-user-2-fill"></i> Director:</strong> {{ movie.director }}</p>
        <p><strong <i class="ri-star-fill text-warning"></i> Rating:</strong> {{ movie.rating }}/10</p>
        <p><i class="ri-calendar-2-line text-primary"></i> <strong>Data lansare:</strong> {{ movie.release_date|date }}</p>
        
        <hr>

        <div class="alert alert-light border-0 border-start border-danger border-4" role="alert">
            <p><strong>Poveste:</strong> {{ movie.storyline }}</p>
        </div>

    </div>

{% endblock %}
